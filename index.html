<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyLearning | Open AI Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        .nav-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); border-bottom: 1px solid #e2e8f0; }
        .iframe-wrapper { height: calc(100vh - 64px); width: 100%; border: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="nav-glass h-16 flex items-center justify-between px-6 z-20">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">SkyLearning</h1>
        </div>

        <div class="flex items-center gap-4">
            <span class="hidden md:inline-block text-xs font-semibold text-slate-400 uppercase tracking-widest">Global AI Node</span>
            <div class="h-4 w-[1px] bg-slate-200 mx-2"></div>
            <button onclick="location.reload()" class="text-slate-500 hover:text-indigo-600 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </nav>

    <main class="flex-grow relative bg-white">
        <iframe 
            src="https://huggingface.co/chat/" 
            class="iframe-wrapper"
            allow="clipboard-read; clipboard-write; microphone"
            title="SkyLearning AI Hub">
        </iframe>
    </main>

</body>
</html>
