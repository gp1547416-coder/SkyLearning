<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyLearning | AI-Powered Education</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            overflow: hidden; /* Prevent double scrollbars */
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        .iframe-container {
            height: calc(100vh - 64px); /* Subtract header height */
            width: 100%;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="glass-nav h-16 flex items-center justify-between px-6 z-10">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center shadow-lg">
                <span class="text-white font-bold">S</span>
            </div>
            <h1 class="text-xl font-semibold text-slate-800 tracking-tight">SkyLearning</h1>
        </div>
        
        <div class="hidden md:flex space-x-6 text-sm font-medium text-slate-600">
            <a href="#" class="hover:text-blue-600 transition">Dashboard</a>
            <a href="#" class="hover:text-blue-600 transition">Resources</a>
            <a href="#" class="hover:text-blue-600 transition">Settings</a>
        </div>

        <button class="bg-slate-900 text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-800 transition shadow-md">
            Go Pro
        </button>
    </nav>

    <main class="flex-grow iframe-container bg-white">
        <iframe 
            src="https://gemini.google.com/app" 
            class="w-full h-full border-none"
            allow="camera; microphone; clipboard-read; clipboard-write;"
            title="SkyLearning AI Workspace">
        </iframe>
    </main>

</body>
</html>
