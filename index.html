<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyLearning | Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top left, #0f172a 0%, #020617 100%);
            font-family: 'Inter', sans-serif;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(79, 70, 229, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #player {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
    </style>
</head>
<body class="min-h-screen text-slate-300 flex flex-col">

    <nav class="h-20 px-10 flex items-center justify-between border-b border-white/5 bg-slate-900/50 backdrop-blur-xl sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-600/20">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <h1 class="text-2xl font-black text-white tracking-tighter italic">SkyLearning</h1>
        </div>
        <div class="flex gap-4 items-center">
            <span id="lesson-status" class="text-indigo-400 font-bold text-xs tracking-widest uppercase">Lesson 1</span>
            <div class="px-3 py-1 bg-indigo-500/10 border border-indigo-500/20 rounded-full text-[10px] text-indigo-400 font-bold tracking-tighter">AUTO-ADVANCE ACTIVE</div>
        </div>
    </nav>

    <main class="flex-grow p-6 lg:p-10 flex flex-col lg:flex-row gap-8">
        <div class="flex-grow">
            <div class="video-container">
                <div id="player"></div>
            </div>
            
            <div class="mt-8 flex flex-col sm:flex-row sm:items-center justify-between gap-6">
                <div>
                    <h2 id="video-title" class="text-3xl font-bold text-white mb-1 tracking-tight">Heavenly Jumpstyle</h2>
                    <p id="video-desc" class="text-slate-500 font-medium">Phase 1 • Rhythm & Flow</p>
                </div>
                <button id="next-btn" onclick="handleNavigation()" class="bg-white text-slate-950 px-10 py-4 rounded-2xl font-bold hover:bg-indigo-500 hover:text-white transition-all active:scale-95 shadow-xl">
                    Skip Lesson →
                </button>
            </div>
        </div>

        <aside class="lg:w-80 xl:w-96 flex flex-col gap-6">
            <div class="bg-white/5 border border-white/10 p-6 rounded-3xl">
                <h4 class="text-white font-bold mb-4 flex items-center gap-2 text-sm uppercase tracking-wider">Session Notes</h4>
                <textarea class="w-full h-48 bg-transparent border-none outline-none text-sm text-slate-400 resize-none placeholder-slate-600" placeholder="Jot down ideas..."></textarea>
            </div>
            <div class="bg-indigo-600 p-6 rounded-3xl relative overflow-hidden group">
                <p class="text-[10px] font-bold text-indigo-200 uppercase mb-1">Up Next</p>
                <h4 id="next-preview" class="text-white font-bold text-lg leading-tight italic">!? by Lungskull</h4>
            </div>
        </aside>
    </main>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var currentStep = 1;
        
        const playlist = [
            { id: 'NJNYxzdglqE', title: 'Heavenly Jumpstyle', desc: 'Phase 1 • Rhythm & Flow', next: '!? by Lungskull' },
            { id: '4ohhe4ytJX0', title: '!? by Lungskull', desc: 'Phase 2 • Cyber Aesthetic', next: 'Foreign' },
            { id: 'N3j-NbfI7FI', title: 'Foreign', desc: 'Phase 3 • Cinematic Flow', next: 'Envy (slowed)' },
            { id: '497_L5i1LTc', title: 'Envy (slowed)', desc: 'Phase 4 • Atmospheric Audio', next: 'MALA FAMA' },
            { id: 'Nt-NpX490CE', title: 'MALA FAMA', desc: 'Final Phase • Extended Edit', next: 'Session Complete' }
        ];

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: playlist[0].id,
                playerVars: { 'autoplay': 0, 'rel': 0, 'modestbranding': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED) {
                handleNavigation();
            }
        }

        function handleNavigation() {
            if (currentStep < playlist.length) {
                const data = playlist[currentStep];
                
                player.loadVideoById(data.id);
                
                document.getElementById('video-title').innerText = data.title;
                document.getElementById('video-desc').innerText = data.desc;
                document.getElementById('next-preview').innerText = data.next;
                document.getElementById('lesson-status').innerText = "LESSON " + (currentStep + 1);
                
                if (currentStep === playlist.length - 1) {
                    document.getElementById('next-btn').innerText = "Finish Session";
                }
                
                currentStep++;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                alert("SkyLearning Session Complete!");
            }
        }
    </script>
</body>
</html>
