<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyLearning | Video Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col font-sans">

    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-slate-900/50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg shadow-lg shadow-blue-500/20"></div>
            <span class="text-xl font-bold tracking-tight text-white">SkyLearning</span>
        </div>
        <div class="flex gap-4">
            <span class="text-xs font-mono text-blue-400 bg-blue-400/10 px-2 py-1 rounded">LIVE WORKSPACE</span>
        </div>
    </header>

    <main class="flex-grow flex p-6 gap-6">
        <aside class="w-72 flex flex-col gap-4">
            <div class="glass-panel p-5 rounded-2xl">
                <h3 class="text-sm font-semibold text-white mb-2">About this Session</h3>
                <p class="text-xs text-slate-400 leading-relaxed">
                    You are watching: <br>
                    <span class="text-blue-300">"The world of luxury"</span>
                </p>
            </div>
            
            <div class="glass-panel p-5 rounded-2xl flex-grow">
                <h3 class="text-sm font-semibold text-white mb-3">Study Notes</h3>
                <textarea 
                    class="w-full h-48 bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-xs focus:ring-1 focus:ring-blue-500 outline-none resize-none"
                    placeholder="Capture timestamps or ideas..."></textarea>
            </div>
        </aside>

        <section class="flex-grow">
            <div class="video-container shadow-2xl shadow-blue-500/10">
                <iframe 
                    src="https://www.youtube.com/embed/MhRjXodyTRM?autoplay=0&rel=0" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                </iframe>
            </div>
            
            <div class="mt-6 flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-bold text-white">Luxury & Lifestyle</h2>
                    <p class="text-slate-500 text-sm">Visual Learning Series • Chapter 1</p>
                </div>
                <button class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-full font-semibold transition text-sm">
                    Next Lesson
                </button>
            </div>
        </section>
    </main>

</body>
</html>
